# ── AlertManager configuration ────────────────────────────────────────────────
# Replace <PLACEHOLDER> values with real webhook URLs / keys.
# In production, inject these via environment variables or a secrets manager.

global:
  resolve_timeout: 5m
  # Default Slack webhook (overridden per route)
  slack_api_url: "<SLACK_WEBHOOK_URL>"

# ── Routing tree ──────────────────────────────────────────────────────────────
route:
  receiver: slack-default
  group_by: [alertname, severity, service]
  group_wait: 10s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    # Critical alerts → PagerDuty (page on-call) + Slack
    - match:
        severity: critical
      receiver: pagerduty-critical
      continue: true   # also send to Slack

    # All alerts → Slack channel
    - match_re:
        severity: (critical|warning)
      receiver: slack-alerts

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:

  # ── Default (fallback) ────────────────────────────────────────────────────────
  - name: slack-default
    slack_configs:
      - channel: "#ops-alerts"
        title: "{{ .GroupLabels.alertname }}"
        text: >-
          {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
        send_resolved: true

  # ── Slack ─────────────────────────────────────────────────────────────────────
  - name: slack-alerts
    slack_configs:
      - channel: "#ops-alerts"
        send_resolved: true
        icon_emoji: ":rotating_light:"
        title: >-
          [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}]
          {{ .GroupLabels.alertname }}
        text: >-
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Severity:* {{ .Labels.severity }}
          *Description:* {{ .Annotations.description }}
          {{ if .Annotations.runbook_url }}*Runbook:* {{ .Annotations.runbook_url }}{{ end }}
          {{ end }}
        actions:
          - type: button
            text: "View in Grafana"
            url: "http://grafana:3000"
          - type: button
            text: "View Alerts"
            url: "http://alertmanager:9093"

  # ── PagerDuty ─────────────────────────────────────────────────────────────────
  - name: pagerduty-critical
    pagerduty_configs:
      - routing_key: "<PAGERDUTY_INTEGRATION_KEY>"
        severity: critical
        description: "{{ .GroupLabels.alertname }}: {{ (index .Alerts 0).Annotations.summary }}"
        details:
          description: "{{ (index .Alerts 0).Annotations.description }}"
          runbook: "{{ (index .Alerts 0).Annotations.runbook_url }}"

# ── Inhibition rules ──────────────────────────────────────────────────────────
inhibit_rules:
  # If the service is completely down, suppress latency/error-rate alerts
  - source_match:
      alertname: ServiceDown
    target_match_re:
      alertname: (HighErrorRate|HighLatencyP99|HighLatencyP95)
    equal: [service]
