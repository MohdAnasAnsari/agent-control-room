[pytest]
asyncio_mode = auto
testpaths = tests

# Coverage defaults (overridable via CLI flags)
addopts =
    --cov=app
    --cov-report=term-missing
    --cov-report=xml:coverage.xml
    --cov-fail-under=80
    -v
    --tb=short

# Treat warnings as errors except deprecation noise from third-party libs
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
