# ── Secret template — DO NOT commit real values ───────────────────────────────
# This file is a reference template only. Never store real secrets in git.
#
# Recommended approaches:
#   AWS:  Use External Secrets Operator + AWS Secrets Manager
#   GCP:  Use External Secrets Operator + GCP Secret Manager
#   Manual: kubectl create secret generic orchestrator-secrets \
#             --from-literal=SECRET_KEY='...' \
#             --from-literal=DATABASE_URL='...' \
#             -n orchestrator
#
# Apply namespace first: kubectl create namespace orchestrator

apiVersion: v1
kind: Secret
metadata:
  name: orchestrator-secrets
  namespace: orchestrator
type: Opaque
# stringData values are base64-encoded by Kubernetes automatically.
# Replace every <placeholder> before applying.
stringData:
  # Generate: python -c "import secrets; print(secrets.token_urlsafe(32))"
  SECRET_KEY: "<generate-with-python-secrets>"
  ENCRYPTION_KEY: "<generate-with-python-secrets>"

  # postgresql+asyncpg://user:password@rds-endpoint:5432/orchestrator
  DATABASE_URL: "<postgresql+asyncpg://user:password@your-rds-endpoint:5432/orchestrator>"

  # rediss:// for TLS-enabled ElastiCache
  REDIS_URL: "<rediss://your-elasticache-endpoint:6379/0>"

  # AI provider keys
  ANTHROPIC_API_KEY: "<sk-ant-...>"
  OPENAI_API_KEY: "<sk-...>"
  GROQ_API_KEY: "<gsk_...>"
